<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
      <header>
        <h1>This is our contact page</h1>
        <ul>
            <li><a href="index.html">HomePage</a></li>
            <li><a href="about.html">AboutPage</a></li>
            <li><a href="contact.html">ContactUs Page</a></li>
            <li><a href="course.html">Course Details page</a></li>
        </ul>
    </header>
    <main>
        <h2>You can connect to us directly with filling all the proper details</h2>
        <img src="https://nrdcindia.com/uploads/images/1568886999Conatct2.jpg" height="200px" width="250px" alt="contact">
        <form>
            <label for="name">Name:</label>
            <input type="text" name="username" id="name">
            <br><br>
            <label for="email">Email Address</label>
            <input type="email" name="email" id="email" placeholder="enter the email as abc@gmail.com">
            <br><br>
            <label for="tel">Phone number</label>
            <input type="tel" name="phone number" id="tel">
            <br><br>
            <h3>Gender:</h3>
            <label for="male">Male</label>
            <input type="radio" name="gender" id="male" value="male">
            <label for="female">Female</label>
            <input type="radio" name="gender" id="female" value="female">
            <label for="others">Others</label>
            <input type="radio" name="gender" id="others" value="others">  
            <br><br>
            <button type="submit">Submit</button> 
            <button type="reset">Clear Form</button>   
        </form>

    </main>
    <footer>
        <p>Copyright &copy; All rights are reserved.</p>
    </footer>
</body>
</html>
