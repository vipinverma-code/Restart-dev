<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form>
        <label for="name">Name:</label>
        <input type="text" name="username" id="name">
        <br>
        <br>
        <label for="fname">Father Name:</label>
        <input type="text" name="father's name" id="fname">
        <br>
        <br>
        <label for="age">Age:</label>
        <input type="number" name="Age" id="age">
        <br>
        <br>
        <label for="password">Password:</label>
        <input type="password" name="user password" id="password">
        <br>
        <br>
        <label for="gender">Male</label>
        <input type="radio" name="gender" id="gender" value="male">
         <label for="gender">female</label>
        <input type="radio" name="gender" id="gender" value="female">
         <label for="gender">Other</label>
        <input type="radio" name="gender" id="gender" value="Other"> 
        <br>
        <br>
        <label for="checkbox">C++</label>
        <input type="checkbox" name="Subject" id="checkbox" value="C++">
        <label for="checkbox">Java</label>
        <input type="checkbox" name="Subject" id="checkbox" value="Java">
        <label for="checkbox">python</label>
        <input type="checkbox" name="Subject" id="checkbox" value="python">
        <label for="checkbox">Javascript</label>
        <input type="checkbox" name="Subject" id="checkbox" value="Javascript">
        <br>
        <br>
        <input type="submit">
    </form>
</body>
</html>
